kind = "web"
previewPath = "/"
title = "MJ Fitness"
version = "1.0.0"
id = "artifacts/mj-fitness"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/mj-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mj-fitness", "run", "build" ]
serve = "static"
publicDir = "artifacts/mj-fitness/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
